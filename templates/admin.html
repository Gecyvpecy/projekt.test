<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | PC AI Advisor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-light: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-light);
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 1100px; margin: 0 auto; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding: 1rem 0;
        }

        .back-link {
            text-decoration: none;
            color: var(--primary);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
        }

        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
        }

        h2 { font-size: 1.25rem; margin-top: 0; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }

        /* Uživatelé */
        .user-list { list-style: none; padding: 0; }
        .user-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: rgba(15, 23, 42, 0.5);
            margin-bottom: 8px;
            border-radius: 10px;
        }
        .user-badge i { color: var(--primary); }

        /* Logy */
        .log-container {
            max-height: 500px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
        }

        .log-entry {
            padding: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            gap: 15px;
        }

        .log-time { color: var(--primary); min-width: 80px; }
        .log-msg { color: var(--text-dim); }

        /* Statistiky */
        .stat-card {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
        }
        .stat-box { text-align: center; }
        .stat-val { font-size: 2rem; font-weight: 700; display: block; color: var(--primary); }
        .stat-label { font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; }

    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-tools"></i> Správa systému</h1>
            <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> Zpět na web</a>
        </header>

        <div class="stat-card">
            <div class="stat-box">
                <span class="stat-val">{{ uzivatele|length }}</span>
                <span class="stat-label">Registrovaných</span>
            </div>
            <div class="stat-box">
                <span class="stat-val">{{ logy|length }}</span>
                <span class="stat-label">Akcí v logu</span>
            </div>
        </div>

        <div class="grid">
            <div class="card">
                <h2><i class="fas fa-users"></i> Uživatelé</h2>
                <div class="user-list">
                    {% for u in uzivatele %}
                    <div class="user-badge">
                        <i class="fas fa-circle-user"></i>
                        <span>{{ u }}</span>
                    </div>
                    {% endfor %}
                </div>
            </div>

            <div class="card">
                <h2><i class="fas fa-terminal"></i> Systémový log</h2>
                <div class="log-container">
                    {% for log in logy %}
                    <div class="log-entry">
                        <span class="log-msg">{{ log }}</span>
                    </div>
                    {% endfor %}
                </div>
            </div>
        </div>
    </div>
</body>
</html>
