<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PC Builder AI Assistant</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        input[type="number"] {
            width: calc(100% - 22px);
            padding: 10px;
            margin: 15px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
        }
        button:hover {
            background-color: #0056b3;
        }
        .chat-box {
            margin-top: 20px;
            padding: 15px;
            background-color: #e9ecef;
            border-radius: 5px;
            min-height: 50px;
            text-align: left;
            font-size: 15px;
        }
        .loading {
            font-style: italic;
            color: #666;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>PC Builder AI Assistant</h2>
    <p>Zadej svůj budget v Kč a AI ti doporučí komponentu.</p>
    
    <input type="number" id="budgetInput" placeholder="Např. 15000" required>
    <button onclick="askAI()">Poradit komponentu</button>

    <div class="chat-box" id="responseBox">
        Zde se zobrazí odpověď...
    </div>
</div>

<script>
    async function askAI() {
        const budget = document.getElementById("budgetInput").value;
        const responseBox = document.getElementById("responseBox");

        if (!budget) {
            responseBox.innerHTML = "Prosím, zadej nějakou částku.";
            return;
        }

        responseBox.innerHTML = '<span class="loading">AI přemýšlí (může to chvilku trvat)...</span>';

        try {
            const response = await fetch('/ai', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ budget: budget })
            });

            const data = await response.json();
            
            if (data.recommendation) {
                responseBox.innerHTML = "<strong>AI:</strong> " + data.recommendation;
            } else {
                responseBox.innerHTML = "<strong>Chyba:</strong> " + (data.error || "Něco se pokazilo.");
            }
        } catch (error) {
            responseBox.innerHTML = "<strong>Chyba sítě:</strong> Nepodařilo se spojit se serverem.";
        }
    }
</script>

</body>
</html>
