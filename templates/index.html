<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>AI Poradce</title>
    <style>
        body { font-family: sans-serif; background: #f9fafb; margin: 0; }
        nav { background: white; padding: 15px 30px; display: flex; justify-content: space-between; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .container { max-width: 600px; margin: 50px auto; padding: 20px; background: white; border-radius: 15px; text-align: center; }
        input { padding: 12px; width: 60%; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; }
        button { padding: 12px 20px; background: #2563eb; color: white; border: none; border-radius: 8px; cursor: pointer; }
        #res { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; text-align: left; line-height: 1.5; }
        .loader { display: none; border: 4px solid #f3f3f3; border-top: 4px solid #2563eb; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 15px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <nav>
        <strong>PC Builder AI 🤖</strong>
        <div>
            <span>Uživatel: <b>{{ session['user'] }}</b></span>
            <a href="/logout" style="margin-left: 15px; color: red; text-decoration: none;">Odhlásit</a>
        </div>
    </nav>
    <div class="container">
        <h1>Kolik chcete investovat?</h1>
        <input type="number" id="budget" placeholder="Zadejte Kč">
        <button onclick="ask()">Poradit</button>
        <div id="loader" class="loader"></div>
        <div id="res"></div>
    </div>

    <script>
        async function ask() {
            const b = document.getElementById('budget').value;
            const r = document.getElementById('res');
            const l = document.getElementById('loader');
            if(!b) return alert("Zadej částku");
            
            r.style.display = 'none'; l.style.display = 'block';
            const res = await fetch('/ai', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({budget: b})
            });
            const data = await res.json();
            l.style.display = 'none'; r.style.display = 'block';
            if(res.ok) {
                r.style.background = '#ecfdf5';
                r.innerHTML = `<b>Návrh AI:</b><br>${data.recommendation}`;
            } else {
                r.style.background = '#fef2f2';
                r.innerText = data.error;
            }
        }
    </script>
</body>
</html>
