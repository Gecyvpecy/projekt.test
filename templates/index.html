<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PC AI Advisor | Inteligentní rádce</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-light: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: var(--text-light);
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navigační menu */
        nav {
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logout-btn {
            color: #ef4444;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            padding: 8px 16px;
            border-radius: 8px;
            transition: 0.3s;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.1);
        }

        /* Hlavní obsah */
        .container {
            max-width: 800px;
            margin: 60px auto;
            padding: 0 20px;
            flex-grow: 1;
        }

        .hero {
            text-align: center;
            margin-bottom: 3rem;
        }

        .hero h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            letter-spacing: -1px;
        }

        .hero p {
            color: var(--text-dim);
            font-size: 1.2rem;
        }

        /* Interaktivní karta */
        .input-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            padding: 2.5rem;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            transition: transform 0.3s ease;
        }

        .input-group {
            position: relative;
            margin-bottom: 1.5rem;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
        }

        input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            background: rgba(15, 23, 42, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 1.1rem;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
        }

        button {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        button:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }

        /* Výsledek */
        #res {
            margin-top: 2rem;
            padding: 20px;
            border-radius: 16px;
            background: rgba(99, 102, 241, 0.1);
            border: 1px dashed var(--primary);
            display: none;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Loader */
        .loader {
            display: none;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-dim);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">
            <i class="fas fa-microchip"></i>
            PC Advisor AI
        </div>
        <div class="user-info">
            <span><i class="far fa-user"></i> {{ session['user'] }}</span>
            <a href="/logout" class="logout-btn">Odhlásit se</a>
        </div>
    </nav>

    <div class="container">
        <div class="hero">
            <h1>Sestavte si svůj <span style="color: var(--primary)">sen</span></h1>
            <p>Zadejte váš rozpočet a naše AI vám doporučí nejlepší komponentu na trhu.</p>
        </div>

        <div class="input-card">
            <div class="input-group">
                <i class="fas fa-wallet"></i>
                <input type="number" id="budget" placeholder="Kolik chcete investovat? (Kč)" required>
            </div>
            <button onclick="ask()">
                <span id="btnText">Získat doporučení</span>
                <div id="loader" class="loader"></div>
            </button>

            <div id="res">
                <div style="font-size: 0.8rem; text-transform: uppercase; color: var(--primary); font-weight: 700; margin-bottom: 8px;">
                    <i class="fas fa-robot"></i> Odpověď AI
                </div>
                <div id="aiText"></div>
            </div>
        </div>
    </div>

    <footer>
        &copy; 2026 PC AI Advisor | Běží na Gemma 3
    </footer>

    <script>
        async function ask() {
            const budget = document.getElementById('budget').value;
            const resBox = document.getElementById('res');
            const aiText = document.getElementById('aiText');
            const btnText = document.getElementById('btnText');
            const loader = document.getElementById('loader');

            if (!budget) {
                alert("Zadejte prosím částku.");
                return;
            }

            // UI stav: Loading
            btnText.style.display = 'none';
            loader.style.display = 'block';
            resBox.style.display = 'none';

            try {
                const response = await fetch('/ai', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ budget: budget })
                });

                const data = await response.json();

                if (response.ok) {
                    aiText.innerHTML = data.recommendation;
                    resBox.style.display = 'block';
                } else {
                    aiText.innerHTML = "Omlouváme se, došlo k chybě: " + data.error;
                    resBox.style.display = 'block';
                }
            } catch (error) {
                aiText.innerHTML = "Chyba připojení k serveru.";
                resBox.style.display = 'block';
            } finally {
                btnText.style.display = 'block';
                loader.style.display = 'none';
            }
        }
    </script>
</body>
</html>
