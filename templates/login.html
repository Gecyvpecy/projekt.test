<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Login | PC AI Advisor</title>
    <style>
        body { font-family: sans-serif; background: #f3f4f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 320px; }
        input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; margin-top: 5px; }
        .btn-login { background: #2563eb; }
        .btn-reg { background: #10b981; }
        .msg { padding: 10px; border-radius: 6px; margin-bottom: 10px; text-align: center; font-size: 0.9rem; }
        .error { background: #fee2e2; color: #dc2626; border: 1px solid #dc2626; }
        .success { background: #d1fae5; color: #065f46; border: 1px solid #10b981; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="text-align: center;">PC AI Advisor</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="msg {{ category }}">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}
        
        <form action="/login_user" method="POST">
            <input type="text" name="username" placeholder="Uživatelské jméno" required>
            <input type="password" name="password" placeholder="Heslo" required>
            <button type="submit" class="btn-login">Přihlásit se</button>
        </form>

        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
        
        <form action="/register_user" method="POST">
            <input type="text" name="username" placeholder="Nové jméno" required>
            <input type="password" name="password" placeholder="Nové heslo" required>
            <button type="submit" class="btn-reg">Registrovat se</button>
        </form>
    </div>
</body>
</html>
