services:
  app:
    build: .
    ports:
      - "8081:5000"
    environment:
      - PORT=5000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - REDIS_HOST=cache
    depends_on:
      - cache

  cache:
    image: redis:7-alpine
    # Příkaz 'appendonly yes' zapne ukládání na disk
    # Příkaz '--dir /data' řekne Redisu, aby soubor s daty uložil do té 1GB složky
    command: redis-server --appendonly yes --dir /data
