services:
  web:
    build: .
    ports:
      - "8081:8081"
    environment:
      - PORT=8081
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - REDIS_HOST=cache  # Název služby 'cache' funguje jako hostname
    depends_on:
      - cache

  cache:
    image: redis:7-alpine  # Použití povoleného image z tabulky
