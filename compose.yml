services:
  app:
    build: .
    ports:
      - "8081:8081"
    environment:
      - PORT=8081
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - REDIS_HOST=cache
    depends_on:
      - cache

  cache:
    image: redis:7-alpine
    # Tady je to nejdůležitější:
    # 1. --appendonly yes -> zapne ukládání na disk
    # 2. --dir /data -> řekne Redisu, aby ukládal do té učitelovy složky
    command: redis-server --appendonly yes --dir /data
