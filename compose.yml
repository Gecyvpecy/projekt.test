services:
  web_app:
    build: .
    ports:
      - "8081:8081"
    environment:
      - PORT=8081
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - REDIS_HOST=moje_db
    depends_on:
      - moje_db

  moje_db:
    image: redis:7-alpine # Povolený image
