services:
  app:  # Místo 'web_app' použij jen 'app' (splňuje limit 21 znaků)
    build: .
    ports:
      - "8081:8081"
    environment:
      - PORT=8081
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - REDIS_HOST=moje-db # I zde nepoužívej podtržítko
    depends_on:
      - moje-db

  moje-db: # Název služby pro databázi bez podtržítek
    image: redis:7-alpine
